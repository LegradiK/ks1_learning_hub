<!-- ============================================================
     UK MONEY SPRITE — stylised, copyright-safe coins & notes
     Include once near the top of the game template.
     Then stamp any coin/note with:
         <svg class="money" viewBox="0 0 100 100"><use href="#coin-50"/></svg>
         <svg class="money money-note" viewBox="0 0 200 110"><use href="#note-1000"/></svg>
     Values are pence: coin-1 ... coin-200, note-500 ... note-5000.

     Suggested on-screen widths (relative size teaches recognition):
       coin-5:  46px   coin-1: 52px   coin-20: 56px   coin-10: 60px
       coin-2:  66px   coin-100: 60px coin-50: 70px   coin-200: 74px
       notes: 150px wide (all the same — fanned notes read fine equal)
     ============================================================ -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>

    <!-- ======== shared bits ======== -->
    <style>
      .coin-txt {
        font-family: "Fredoka", system-ui, sans-serif;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: central;
      }
    </style>

    <!-- ======== copper coins (1p, 2p) ======== -->
    <symbol id="coin-1" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="47" fill="#C97E4A" stroke="#9C5A2E" stroke-width="5"/>
      <circle cx="50" cy="50" r="36" fill="none" stroke="#B26A3B" stroke-width="2"/>
      <text x="50" y="50" class="coin-txt" font-size="30" fill="#5E3517">1p</text>
    </symbol>

    <symbol id="coin-2" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="47" fill="#C97E4A" stroke="#9C5A2E" stroke-width="5"/>
      <circle cx="50" cy="50" r="36" fill="none" stroke="#B26A3B" stroke-width="2"/>
      <text x="50" y="50" class="coin-txt" font-size="30" fill="#5E3517">2p</text>
    </symbol>

    <!-- ======== round silver coins (5p, 10p) ======== -->
    <symbol id="coin-5" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="47" fill="#D5D9DF" stroke="#9AA1AB" stroke-width="5"/>
      <circle cx="50" cy="50" r="36" fill="none" stroke="#B8BEC7" stroke-width="2"/>
      <text x="50" y="50" class="coin-txt" font-size="30" fill="#4A5058">5p</text>
    </symbol>

    <symbol id="coin-10" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="47" fill="#D5D9DF" stroke="#9AA1AB" stroke-width="5"/>
      <circle cx="50" cy="50" r="36" fill="none" stroke="#B8BEC7" stroke-width="2"/>
      <text x="50" y="50" class="coin-txt" font-size="28" fill="#4A5058">10p</text>
    </symbol>

    <!-- ======== heptagonal silver coins (20p, 50p) ======== -->
    <symbol id="coin-20" viewBox="0 0 100 100">
      <polygon points="50,4 86,21.3 94.9,60.2 70,91.5 30,91.5 5.1,60.2 14,21.3"
               fill="#D5D9DF" stroke="#9AA1AB" stroke-width="5" stroke-linejoin="round"/>
      <polygon points="50,15 77.5,28.2 84.3,58 65.3,81.9 34.7,81.9 15.7,58 22.5,28.2"
               fill="none" stroke="#B8BEC7" stroke-width="2" stroke-linejoin="round"/>
      <text x="50" y="52" class="coin-txt" font-size="26" fill="#4A5058">20p</text>
    </symbol>

    <symbol id="coin-50" viewBox="0 0 100 100">
      <polygon points="50,4 86,21.3 94.9,60.2 70,91.5 30,91.5 5.1,60.2 14,21.3"
               fill="#D5D9DF" stroke="#9AA1AB" stroke-width="5" stroke-linejoin="round"/>
      <polygon points="50,15 77.5,28.2 84.3,58 65.3,81.9 34.7,81.9 15.7,58 22.5,28.2"
               fill="none" stroke="#B8BEC7" stroke-width="2" stroke-linejoin="round"/>
      <text x="50" y="52" class="coin-txt" font-size="26" fill="#4A5058">50p</text>
    </symbol>

    <!-- ======== £1: 12-sided, gold ring + silver middle ======== -->
    <symbol id="coin-100" viewBox="0 0 100 100">
      <polygon points="50,4 73,10.2 89.8,27 96,50 89.8,73 73,89.8 50,96 27,89.8 10.2,73 4,50 10.2,27 27,10.2"
               fill="#E5B84B" stroke="#B98F2E" stroke-width="4" stroke-linejoin="round"/>
      <circle cx="50" cy="50" r="27" fill="#D5D9DF" stroke="#B8BEC7" stroke-width="2"/>
      <text x="50" y="50" class="coin-txt" font-size="24" fill="#4A5058">£1</text>
    </symbol>

    <!-- ======== £2: big, silver middle + gold ring ======== -->
    <symbol id="coin-200" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="47" fill="#E5B84B" stroke="#B98F2E" stroke-width="4"/>
      <circle cx="50" cy="50" r="30" fill="#D5D9DF" stroke="#B8BEC7" stroke-width="2"/>
      <text x="50" y="50" class="coin-txt" font-size="24" fill="#4A5058">£2</text>
    </symbol>

    <!-- ======== notes: polymer colours, big value, wavy accent ======== -->
    <symbol id="note-500" viewBox="0 0 200 110">
      <rect x="3" y="3" width="194" height="104" rx="10"
            fill="#BFE9EE" stroke="#3FB7C6" stroke-width="5"/>
      <path d="M0 78 Q 50 62 100 78 T 200 78 L 200 107 Q 100 107 0 107 Z"
            fill="#3FB7C6" opacity="0.35"/>
      <circle cx="163" cy="34" r="17" fill="#FFFFFF" opacity="0.6"/>
      <text x="88" y="50" class="coin-txt" font-size="42" fill="#17727D">£5</text>
      <text x="100" y="93" class="coin-txt" font-size="14" fill="#17727D">FIVE POUNDS</text>
    </symbol>

    <symbol id="note-1000" viewBox="0 0 200 110">
      <rect x="3" y="3" width="194" height="104" rx="10"
            fill="#F8DCC0" stroke="#E8863C" stroke-width="5"/>
      <path d="M0 78 Q 50 62 100 78 T 200 78 L 200 107 Q 100 107 0 107 Z"
            fill="#E8863C" opacity="0.35"/>
      <circle cx="163" cy="34" r="17" fill="#FFFFFF" opacity="0.6"/>
      <text x="88" y="50" class="coin-txt" font-size="42" fill="#9C4F13">£10</text>
      <text x="100" y="93" class="coin-txt" font-size="14" fill="#9C4F13">TEN POUNDS</text>
    </symbol>

    <symbol id="note-2000" viewBox="0 0 200 110">
      <rect x="3" y="3" width="194" height="104" rx="10"
            fill="#E3D4F2" stroke="#8E6BB5" stroke-width="5"/>
      <path d="M0 78 Q 50 62 100 78 T 200 78 L 200 107 Q 100 107 0 107 Z"
            fill="#8E6BB5" opacity="0.35"/>
      <circle cx="163" cy="34" r="17" fill="#FFFFFF" opacity="0.6"/>
      <text x="88" y="50" class="coin-txt" font-size="42" fill="#553880">£20</text>
      <text x="100" y="93" class="coin-txt" font-size="14" fill="#553880">TWENTY POUNDS</text>
    </symbol>

    <symbol id="note-5000" viewBox="0 0 200 110">
      <rect x="3" y="3" width="194" height="104" rx="10"
            fill="#F5CDCB" stroke="#D4494F" stroke-width="5"/>
      <path d="M0 78 Q 50 62 100 78 T 200 78 L 200 107 Q 100 107 0 107 Z"
            fill="#D4494F" opacity="0.35"/>
      <circle cx="163" cy="34" r="17" fill="#FFFFFF" opacity="0.6"/>
      <text x="88" y="50" class="coin-txt" font-size="42" fill="#8F2226">£50</text>
      <text x="100" y="93" class="coin-txt" font-size="14" fill="#8F2226">FIFTY POUNDS</text>
    </symbol>

  </defs>
</svg>
