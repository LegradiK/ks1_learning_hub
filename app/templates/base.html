<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}KS1 Learning Hub{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<!-- theme-letters / theme-maths / theme-words set the accent colour per game -->
<body class="{% block theme %}theme-hub{% endblock %}">

  <nav class="topbar">
    <a class="logo" href="{{ url_for('hub.index') }}">
      <span class="logo-badge">🏠</span>
      <span class="logo-text">Learning&nbsp;Hub</span>
    </a>

  </nav>

  <main class="page">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="flashes">
        {% for category, message in messages %}
        <p class="flash flash-{{ category }}" role="status">{{ message }}</p>
        {% endfor %}
      </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Made for curious kids ✨</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
